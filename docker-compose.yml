services:

  # ============================================================
  # DATABASES
  # ============================================================

  mysql:
    image: mysql:8.3.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-mysql}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - ./infra/mysql/data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  mongodb:
    image: mongo:7.0.9
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: product-service
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  keycloak-mysql:
    image: mysql:8.3.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${KEYCLOAK_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: keycloak
      MYSQL_USER: ${KEYCLOAK_MYSQL_USER:-keycloak}
      MYSQL_PASSWORD: ${KEYCLOAK_MYSQL_PASSWORD:-password}
    volumes:
      - keycloak_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${KEYCLOAK_MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - keycloak-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ============================================================
  # KEYCLOAK
  # ============================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: keycloak-mysql
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KEYCLOAK_MYSQL_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_MYSQL_PASSWORD:-password}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8181"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8181:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    volumes:
      - ./api-gateway/docker/keycloak/realms/:/opt/keycloak/data/import/
    depends_on:
      keycloak-mysql:
        condition: service_healthy
    networks:
      - frontend-network
      - keycloak-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  # ============================================================
  # MICROSERVICES
  # ============================================================

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/product-service?authSource=admin
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INVENTORY_DB_URL: jdbc:mysql://mysql:3306/inventory_service
      INVENTORY_DB_USER: ${INVENTORY_DB_USER:-inventory_user}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory_pass}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ORDER_DB_URL: jdbc:mysql://mysql:3306/order_service
      ORDER_DB_USER: ${ORDER_DB_USER:-order_user}
      ORDER_DB_PASSWORD: ${ORDER_DB_PASSWORD:-order_pass}
      INVENTORY_URL: http://inventory-service:8084
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ============================================================
  # API GATEWAY
  # ============================================================

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8181/realms/spring-microservices-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/spring-microservices-realm/protocol/openid-connect/certs
      PRODUCT_SERVICE_URL: http://product-service:8081
      ORDER_SERVICE_URL: http://order-service:8085
      INVENTORY_SERVICE_URL: http://inventory-service:8084
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      keycloak:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

# ============================================================
# NETWORKS
# ============================================================

networks:
  # Gateway communicates with all microservices and keycloak
  frontend-network:
    driver: bridge
  # Microservices communicate with databases
  backend-network:
    driver: bridge
  # Keycloak communicates only with its own database
  keycloak-network:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================

volumes:
  mongodb_data:
  keycloak_mysql_data: